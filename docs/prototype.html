<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spending Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --accent: #6366f1;
      --accent-hover: #4f52d9;
      --danger: #ef4444;
      --success: #22c55e;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Layout ── */
    header {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -.5px; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; }

    main { max-width: 900px; margin: 32px auto; padding: 0 16px; }

    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 7px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

    /* ── Cards ── */
    .spending-list { display: flex; flex-direction: column; gap: 10px; }
    .spending-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .spending-card:hover { border-color: var(--accent); }
    .cat-badge {
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
    }
    .cat-FOOD_DINING    { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
    .cat-TRANSPORTATION { background: #0369a122; color: #38bdf8; border: 1px solid #0369a144; }
    .cat-ENTERTAINMENT  { background: #db277722; color: #f472b6; border: 1px solid #db277744; }
    .cat-SHOPPING       { background: #d9770622; color: #fb923c; border: 1px solid #d9770644; }
    .cat-OTHERS         { background: #47556922; color: #94a3b8; border: 1px solid #47556944; }

    .spending-info { flex: 1; min-width: 0; }
    .spending-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .spending-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .spending-amount { font-size: 16px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .spending-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .src-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 20px;
      background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
    }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    .loading-row { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    /* ── Modals ── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.65); backdrop-filter: blur(3px);
      align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 480px;
      box-shadow: var(--shadow); animation: slide-in .2s ease;
    }
    @keyframes slide-in { from { opacity: 0; transform: translateY(16px); } }

    .modal-header {
      padding: 20px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; line-height: 1; padding: 4px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 0 24px 20px; display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Forms ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 9px 12px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; font-family: inherit; }
    select option { background: var(--surface2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Preview card ── */
    .preview-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-top: 16px;
    }
    .preview-card .label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
    .preview-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .preview-row:last-child { margin-bottom: 0; }
    .preview-key { font-size: 13px; color: var(--muted); }
    .preview-val { font-size: 13px; font-weight: 600; }
    .preview-amount { font-size: 20px; font-weight: 800; color: var(--accent); }

    /* ── Verdict ── */
    .verdict-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-top: 16px;
    }
    .verdict-text { font-size: 14px; line-height: 1.6; margin-bottom: 14px; }
    .verdict-section { margin-bottom: 12px; }
    .verdict-section-title { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
    .verdict-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .verdict-list li { font-size: 13px; color: var(--muted); padding-left: 14px; position: relative; }
    .verdict-list li::before { content: '›'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 32px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #6366f108; }
    .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
    .upload-zone p { font-size: 13px; color: var(--muted); }
    .upload-zone input[type=file] { display: none; }
    .upload-preview { display: flex; align-items: center; gap: 10px; margin-top: 12px; background: var(--surface2); border-radius: 7px; padding: 10px 12px; }
    .upload-preview img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; }
    .upload-preview .file-info { flex: 1; min-width: 0; }
    .upload-preview .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upload-preview .file-size { font-size: 11px; color: var(--muted); }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; font-size: 13px;
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px;
      animation: toast-in .2s ease; min-width: 260px;
    }
    @keyframes toast-in { from { opacity: 0; transform: translateX(20px); } }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast .t-icon { font-size: 16px; flex-shrink: 0; }

    /* ── Steps ── */
    .steps { display: flex; gap: 0; margin-bottom: 20px; }
    .step {
      flex: 1; text-align: center; font-size: 12px; font-weight: 600;
      padding: 8px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted);
    }
    .step:first-child { border-radius: 7px 0 0 7px; }
    .step:last-child { border-radius: 0 7px 7px 0; }
    .step.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step.done { background: #22c55e22; border-color: #22c55e44; color: var(--success); }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .total-bar { display: flex; justify-content: space-between; padding: 12px 0; font-weight: 700; font-size: 15px; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 12px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Spending<span>AI</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="openModal('verdict-modal')">📊 Verdict</button>
    <button class="btn btn-ghost btn-sm" onclick="openModal('receipt-modal')">🧾 Receipt</button>
    <button class="btn btn-ghost btn-sm" onclick="openModal('text-modal')">💬 Analyze Text</button>
    <button class="btn btn-primary btn-sm" onclick="openModal('create-modal')">＋ Add</button>
  </div>
</header>

<main>
  <div class="page-title">Spendings</div>
  <div class="page-sub" id="spending-count">Loading...</div>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="openModal('create-modal')">＋ Add Spending</button>
    <button class="btn btn-ghost" onclick="openModal('text-modal')">💬 Analyze Text</button>
    <button class="btn btn-ghost" onclick="openModal('receipt-modal')">🧾 Analyze Receipt</button>
    <button class="btn btn-ghost" onclick="openModal('verdict-modal')">📊 AI Verdict</button>
  </div>

  <div class="spending-list" id="spending-list">
    <div class="loading-row">Loading spendings…</div>
  </div>
</main>

<!-- ── Create Modal ── -->
<div class="overlay" id="create-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Spending</div>
      <button class="modal-close" onclick="closeModal('create-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Title</label>
        <input id="c-title" type="text" placeholder="e.g. Nasi Padang" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Amount (Rp)</label>
          <input id="c-amount" type="number" placeholder="35000" min="0" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="c-category">
            <option value="FOOD_DINING">🍜 Food & Dining</option>
            <option value="TRANSPORTATION">🚗 Transportation</option>
            <option value="ENTERTAINMENT">🎬 Entertainment</option>
            <option value="SHOPPING">🛍️ Shopping</option>
            <option value="OTHERS">📦 Others</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Note <span class="text-muted text-sm">(optional)</span></label>
        <input id="c-note" type="text" placeholder="Brief note..." />
      </div>
      <div class="form-group">
        <label>Date <span class="text-muted text-sm">(optional)</span></label>
        <input id="c-date" type="datetime-local" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
      <button class="btn btn-primary" id="create-btn" onclick="createSpending()">Save Spending</button>
    </div>
  </div>
</div>

<!-- ── Analyze Text Modal ── -->
<div class="overlay" id="text-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">💬 Analyze Text</div>
      <button class="modal-close" onclick="closeModal('text-modal'); resetTextModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="steps" id="text-steps">
        <div class="step active" id="text-step-1">1. Input</div>
        <div class="step" id="text-step-2">2. Preview</div>
        <div class="step" id="text-step-3">3. Done</div>
      </div>

      <div id="text-phase-1">
        <div class="form-group">
          <label>Describe your spending</label>
          <textarea id="t-text" placeholder="e.g. Beli bensin Pertamax 50 ribu sama parkir motor 3000"></textarea>
        </div>
      </div>

      <div id="text-phase-2" style="display:none">
        <div class="preview-card" id="text-preview"></div>
      </div>

      <div id="text-phase-3" style="display:none">
        <div style="text-align:center; padding: 24px 0; color: var(--success);">
          <div style="font-size:40px">✅</div>
          <div style="font-weight:700; margin-top:8px;">Spending saved!</div>
        </div>
      </div>
    </div>
    <div class="modal-footer" id="text-footer">
      <button class="btn btn-ghost" onclick="closeModal('text-modal'); resetTextModal()">Cancel</button>
      <button class="btn btn-primary" id="text-analyze-btn" onclick="analyzeText()">Analyze</button>
    </div>
  </div>
</div>

<!-- ── Analyze Receipt Modal ── -->
<div class="overlay" id="receipt-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🧾 Analyze Receipt</div>
      <button class="modal-close" onclick="closeModal('receipt-modal'); resetReceiptModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="steps">
        <div class="step" id="r-step-1">1. Upload</div>
        <div class="step" id="r-step-2">2. Analyze</div>
        <div class="step" id="r-step-3">3. Done</div>
      </div>

      <div id="receipt-phase-1">
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()"
             ondragover="event.preventDefault(); this.classList.add('drag')"
             ondragleave="this.classList.remove('drag')"
             ondrop="handleDrop(event)">
          <div class="icon">📁</div>
          <p>Click or drag & drop receipt image</p>
          <p style="margin-top:4px; font-size:11px;">JPG, PNG, WEBP</p>
          <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)" />
        </div>
        <div id="file-preview" style="display:none" class="upload-preview">
          <img id="file-thumb" src="" alt="" />
          <div class="file-info">
            <div class="file-name" id="file-name"></div>
            <div class="file-size" id="file-size"></div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="clearFile()">✕</button>
        </div>
      </div>

      <div id="receipt-phase-2" style="display:none">
        <div class="preview-card" id="receipt-preview"></div>
      </div>

      <div id="receipt-phase-3" style="display:none">
        <div style="text-align:center; padding: 24px 0; color: var(--success);">
          <div style="font-size:40px">✅</div>
          <div style="font-weight:700; margin-top:8px;">Spending saved!</div>
        </div>
      </div>
    </div>
    <div class="modal-footer" id="receipt-footer">
      <button class="btn btn-ghost" onclick="closeModal('receipt-modal'); resetReceiptModal()">Cancel</button>
      <button class="btn btn-primary" id="receipt-upload-btn" onclick="uploadAndAnalyze()" disabled>Upload & Analyze</button>
    </div>
  </div>
</div>

<!-- ── Verdict Modal ── -->
<div class="overlay" id="verdict-modal">
  <div class="modal" style="max-width: 540px">
    <div class="modal-header">
      <div class="modal-title">📊 AI Spending Verdict</div>
      <button class="modal-close" onclick="closeModal('verdict-modal'); resetVerdict()">✕</button>
    </div>
    <div class="modal-body">
      <div id="verdict-phase-1">
        <div class="form-row">
          <div class="form-group">
            <label>From</label>
            <input id="v-from" type="date" />
          </div>
          <div class="form-group">
            <label>To</label>
            <input id="v-to" type="date" />
          </div>
        </div>
      </div>
      <div id="verdict-result" style="display:none"></div>
    </div>
    <div class="modal-footer" id="verdict-footer">
      <button class="btn btn-ghost" onclick="closeModal('verdict-modal'); resetVerdict()">Close</button>
      <button class="btn btn-primary" id="verdict-btn" onclick="getVerdict()">Generate Verdict</button>
    </div>
  </div>
</div>

<!-- ── Toast Container ── -->
<div id="toast-container"></div>

<script>
  const API = 'http://localhost:3001';

  // ── Utils ──
  function fmt(n) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n); }
  function fmtDate(d) { return new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }); }

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span class="t-icon">${type === 'success' ? '✅' : '❌'}</span><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function setLoading(btnId, loading, text = '') {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span> ${text}` : btn.dataset.label ?? btn.innerHTML;
    if (!loading && text) btn.dataset.label = undefined;
  }

  const CAT_LABELS = {
    FOOD_DINING: '🍜 Food & Dining',
    TRANSPORTATION: '🚗 Transportation',
    ENTERTAINMENT: '🎬 Entertainment',
    SHOPPING: '🛍️ Shopping',
    OTHERS: '📦 Others',
  };
  const SRC_LABELS = { MANUAL: 'Manual', FREE_TEXT: 'AI Text', RECEIPT: 'Receipt' };

  // ── Spending List ──
  async function loadSpendings() {
    try {
      const res = await fetch(`${API}/spendings`);
      const json = await res.json();
      const entries = json.content?.entries ?? [];
      renderSpendings(entries);
      document.getElementById('spending-count').textContent =
        `${entries.length} spending${entries.length !== 1 ? 's' : ''} total`;
    } catch {
      document.getElementById('spending-list').innerHTML =
        '<div class="loading-row">⚠️ Failed to load. Is the backend running?</div>';
      document.getElementById('spending-count').textContent = '';
    }
  }

  function renderSpendings(entries) {
    const el = document.getElementById('spending-list');
    if (!entries.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">💸</div><p>No spendings yet. Add one!</p></div>`;
      return;
    }
    el.innerHTML = entries.map(s => `
      <div class="spending-card" id="card-${s.id}">
        <div class="cat-badge cat-${s.category}">${s.category.replace('_', ' ')}</div>
        <div class="spending-info">
          <div class="spending-title">${s.title}</div>
          <div class="spending-meta">
            ${fmtDate(s.date)}
            ${s.note ? `· ${s.note}` : ''}
            · <span class="src-badge">${SRC_LABELS[s.source] ?? s.source}</span>
          </div>
        </div>
        <div class="spending-amount">${fmt(s.amount)}</div>
        <div class="spending-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteSpending('${s.id}')">🗑</button>
        </div>
      </div>
    `).join('');
  }

  async function deleteSpending(id) {
    if (!confirm('Delete this spending?')) return;
    try {
      await fetch(`${API}/spendings/${id}`, { method: 'DELETE' });
      document.getElementById(`card-${id}`)?.remove();
      toast('Spending deleted');
      loadSpendings();
    } catch { toast('Failed to delete', 'error'); }
  }

  // ── Create ──
  async function createSpending(prefill = null) {
    const btn = document.getElementById('create-btn');
    const title    = prefill?.title    ?? document.getElementById('c-title').value.trim();
    const amount   = prefill?.amount   ?? parseFloat(document.getElementById('c-amount').value);
    const category = prefill?.category ?? document.getElementById('c-category').value;
    const note     = prefill?.note     ?? document.getElementById('c-note').value.trim();
    const dateRaw  = prefill?.date     ?? document.getElementById('c-date').value;
    const source   = prefill?.source   ?? 'MANUAL';

    if (!title) { toast('Title is required', 'error'); return; }
    if (!amount || amount <= 0) { toast('Valid amount is required', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving…';

    try {
      const body = { title, amount, category, source, note: note || undefined };
      if (dateRaw) body.date = new Date(dateRaw).toISOString();
      if (prefill?.receiptUrl) body.receiptUrl = prefill.receiptUrl;
      if (prefill?.rawText) body.rawText = prefill.rawText;

      const res = await fetch(`${API}/spendings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.message ?? 'Error');
      toast('Spending saved!');
      closeModal('create-modal');
      clearCreateForm();
      loadSpendings();
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Save Spending';
    }
  }

  function clearCreateForm() {
    ['c-title', 'c-amount', 'c-note', 'c-date'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('c-category').value = 'FOOD_DINING';
  }

  // ── Analyze Text ──
  let textResult = null;

  async function analyzeText() {
    const text = document.getElementById('t-text').value.trim();
    if (!text) { toast('Enter some text first', 'error'); return; }

    const btn = document.getElementById('text-analyze-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Analyzing…';

    try {
      const res = await fetch(`${API}/spendings/analyze-text`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.message ?? 'Error');

      textResult = { ...json.content, rawText: text };
      renderPreview('text-preview', json.content);

      document.getElementById('text-phase-1').style.display = 'none';
      document.getElementById('text-phase-2').style.display = 'block';
      document.getElementById('text-step-1').className = 'step done';
      document.getElementById('text-step-2').className = 'step active';

      document.getElementById('text-footer').innerHTML = `
        <button class="btn btn-ghost" onclick="resetTextModal()">← Back</button>
        <button class="btn btn-primary" onclick="saveFromText()">Save Spending</button>
      `;
    } catch (e) {
      toast(e.message, 'error');
      btn.disabled = false;
      btn.innerHTML = 'Analyze';
    }
  }

  async function saveFromText() {
    if (!textResult) return;
    await savePreview(textResult, 'FREE_TEXT', null, textResult.rawText);
    document.getElementById('text-phase-2').style.display = 'none';
    document.getElementById('text-phase-3').style.display = 'block';
    document.getElementById('text-step-2').className = 'step done';
    document.getElementById('text-step-3').className = 'step active';
    document.getElementById('text-footer').innerHTML = `
      <button class="btn btn-primary" onclick="closeModal('text-modal'); resetTextModal()">Done</button>
    `;
    loadSpendings();
  }

  function resetTextModal() {
    textResult = null;
    document.getElementById('t-text').value = '';
    document.getElementById('text-phase-1').style.display = 'block';
    document.getElementById('text-phase-2').style.display = 'none';
    document.getElementById('text-phase-3').style.display = 'none';
    document.getElementById('text-step-1').className = 'step active';
    document.getElementById('text-step-2').className = 'step';
    document.getElementById('text-step-3').className = 'step';
    document.getElementById('text-footer').innerHTML = `
      <button class="btn btn-ghost" onclick="closeModal('text-modal'); resetTextModal()">Cancel</button>
      <button class="btn btn-primary" id="text-analyze-btn" onclick="analyzeText()">Analyze</button>
    `;
  }

  // ── Upload & Analyze Receipt ──
  let selectedFile = null;
  let uploadedUrl = null;
  let receiptResult = null;

  function handleFileSelect(e) { setFile(e.target.files[0]); }
  function handleDrop(e) { e.preventDefault(); document.getElementById('upload-zone').classList.remove('drag'); setFile(e.dataTransfer.files[0]); }

  function setFile(file) {
    if (!file || !file.type.startsWith('image/')) { toast('Please select an image file', 'error'); return; }
    selectedFile = file;
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
    const reader = new FileReader();
    reader.onload = e => { document.getElementById('file-thumb').src = e.target.result; };
    reader.readAsDataURL(file);
    document.getElementById('file-preview').style.display = 'flex';
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('receipt-upload-btn').disabled = false;
    setReceiptStep(1);
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-preview').style.display = 'none';
    document.getElementById('upload-zone').style.display = 'block';
    document.getElementById('receipt-upload-btn').disabled = true;
  }

  function setReceiptStep(n) {
    [1,2,3].forEach(i => {
      document.getElementById(`r-step-${i}`).className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    });
  }

  async function uploadAndAnalyze() {
    if (!selectedFile) return;
    const btn = document.getElementById('receipt-upload-btn');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Uploading…';
    setReceiptStep(1);

    try {
      const form = new FormData();
      form.append('file', selectedFile);
      const upRes = await fetch(`${API}/storage/upload`, { method: 'POST', body: form });
      const upJson = await upRes.json();
      if (!upRes.ok) throw new Error(upJson.message ?? 'Upload failed');
      uploadedUrl = upJson.content.url;

      btn.innerHTML = '<span class="spinner"></span> Analyzing…';
      setReceiptStep(2);

      const anRes = await fetch(`${API}/spendings/analyze-receipt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: uploadedUrl }),
      });
      const anJson = await anRes.json();
      if (!anRes.ok) throw new Error(anJson.message ?? 'Analysis failed');

      receiptResult = { ...anJson.content, receiptUrl: uploadedUrl };
      renderPreview('receipt-preview', anJson.content);

      document.getElementById('receipt-phase-1').style.display = 'none';
      document.getElementById('receipt-phase-2').style.display = 'block';
      setReceiptStep(2);

      document.getElementById('receipt-footer').innerHTML = `
        <button class="btn btn-ghost" onclick="resetReceiptModal()">← Back</button>
        <button class="btn btn-primary" onclick="saveFromReceipt()">Save Spending</button>
      `;
    } catch (e) {
      toast(e.message, 'error');
      btn.disabled = false;
      btn.innerHTML = 'Upload & Analyze';
    }
  }

  async function saveFromReceipt() {
    if (!receiptResult) return;
    await savePreview(receiptResult, 'RECEIPT', receiptResult.receiptUrl, null);
    document.getElementById('receipt-phase-2').style.display = 'none';
    document.getElementById('receipt-phase-3').style.display = 'block';
    setReceiptStep(3);
    document.getElementById('receipt-footer').innerHTML = `
      <button class="btn btn-primary" onclick="closeModal('receipt-modal'); resetReceiptModal()">Done</button>
    `;
    loadSpendings();
  }

  function resetReceiptModal() {
    selectedFile = null; uploadedUrl = null; receiptResult = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-preview').style.display = 'none';
    document.getElementById('upload-zone').style.display = 'block';
    document.getElementById('receipt-phase-1').style.display = 'block';
    document.getElementById('receipt-phase-2').style.display = 'none';
    document.getElementById('receipt-phase-3').style.display = 'none';
    document.getElementById('receipt-upload-btn').disabled = true;
    document.getElementById('receipt-upload-btn').innerHTML = 'Upload & Analyze';
    setReceiptStep(1);
    document.getElementById('receipt-footer').innerHTML = `
      <button class="btn btn-ghost" onclick="closeModal('receipt-modal'); resetReceiptModal()">Cancel</button>
      <button class="btn btn-primary" id="receipt-upload-btn" onclick="uploadAndAnalyze()" disabled>Upload & Analyze</button>
    `;
  }

  // ── Shared save ──
  async function savePreview(data, source, receiptUrl, rawText) {
    const body = {
      title: data.title,
      amount: data.amount,
      category: data.category,
      source,
      note: data.note || undefined,
    };
    if (receiptUrl) body.receiptUrl = receiptUrl;
    if (rawText) body.rawText = rawText;
    const res = await fetch(`${API}/spendings`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.message ?? 'Save failed');
    toast('Spending saved!');
  }

  // ── Preview renderer ──
  function renderPreview(containerId, data) {
    document.getElementById(containerId).innerHTML = `
      <div class="label">AI Extracted Data</div>
      <div class="preview-row">
        <span class="preview-key">Title</span>
        <span class="preview-val">${data.title}</span>
      </div>
      <div class="preview-row">
        <span class="preview-key">Amount</span>
        <span class="preview-amount">${fmt(data.amount)}</span>
      </div>
      <div class="preview-row">
        <span class="preview-key">Category</span>
        <span class="preview-val"><span class="cat-badge cat-${data.category}">${data.category.replace('_',' ')}</span></span>
      </div>
      ${data.note ? `<div class="preview-row"><span class="preview-key">Note</span><span class="preview-val" style="color:var(--muted)">${data.note}</span></div>` : ''}
    `;
  }

  // ── Verdict ──
  async function getVerdict() {
    const dateFrom = document.getElementById('v-from').value;
    const dateTo   = document.getElementById('v-to').value;
    if (!dateFrom || !dateTo) { toast('Select both dates', 'error'); return; }

    const btn = document.getElementById('verdict-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Generating…';

    try {
      const res = await fetch(`${API}/analysis/verdict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dateFrom, dateTo }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.message ?? 'Error');

      const d = json.content;
      document.getElementById('verdict-phase-1').style.display = 'none';
      document.getElementById('verdict-result').style.display = 'block';
      document.getElementById('verdict-result').innerHTML = `
        <div class="verdict-card">
          <div class="verdict-section">
            <div class="verdict-section-title">Summary</div>
            <div class="verdict-text">${d.verdict}</div>
            <div style="display:flex; gap:8px; flex-wrap:wrap">
              ${Object.entries(d.byCategory).map(([k,v]) => `
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:12px">
                  <div class="text-muted">${k.replace('_',' ')}</div>
                  <div style="font-weight:700">${fmt(v)}</div>
                </div>
              `).join('')}
            </div>
            <hr class="divider"/>
            <div class="total-bar"><span>Total</span><span>${fmt(d.totalAmount)}</span></div>
          </div>
          <div class="verdict-section">
            <div class="verdict-section-title">Key Insights</div>
            <ul class="verdict-list">${d.insights.map(i => `<li>${i}</li>`).join('')}</ul>
          </div>
          <div class="verdict-section">
            <div class="verdict-section-title">Recommendations</div>
            <ul class="verdict-list">${d.recommendations.map(r => `<li>${r}</li>`).join('')}</ul>
          </div>
        </div>
      `;
      document.getElementById('verdict-footer').innerHTML = `
        <button class="btn btn-ghost" onclick="resetVerdict()">← New Query</button>
        <button class="btn btn-primary" onclick="closeModal('verdict-modal'); resetVerdict()">Close</button>
      `;
    } catch (e) {
      toast(e.message, 'error');
      btn.disabled = false;
      btn.innerHTML = 'Generate Verdict';
    }
  }

  function resetVerdict() {
    document.getElementById('verdict-phase-1').style.display = 'block';
    document.getElementById('verdict-result').style.display = 'none';
    document.getElementById('verdict-result').innerHTML = '';
    document.getElementById('verdict-footer').innerHTML = `
      <button class="btn btn-ghost" onclick="closeModal('verdict-modal'); resetVerdict()">Close</button>
      <button class="btn btn-primary" id="verdict-btn" onclick="getVerdict()">Generate Verdict</button>
    `;
  }

  // ── Close on backdrop click ──
  document.querySelectorAll('.overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  // ── Set default dates ──
  const today = new Date().toISOString().split('T')[0];
  const firstOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
  document.getElementById('v-from').value = firstOfMonth;
  document.getElementById('v-to').value = today;

  // ── Init ──
  loadSpendings();
</script>
</body>
</html>
